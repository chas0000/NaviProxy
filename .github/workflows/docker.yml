name: Build Docker Image and Binaries

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'docker'
        type: choice
        options:
          - docker
          - release
          - both

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/naviproxy

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goarch == 'arm64' && '1' || '1' }}
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          BUILD_DATE=$(date +%y%m%d%H%M)
          OUTPUT_NAME="naviproxy-${BUILD_DATE}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-w -s" -trimpath -o "${OUTPUT_NAME}" main.go
          tar czf "${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"
          echo "BINARY_NAME=${OUTPUT_NAME}.tar.gz" >> $GITHUB_ENV
          echo "UNCOMPRESSED_NAME=${OUTPUT_NAME}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}

  build-docker:
    needs: build-binaries
    if: github.event.inputs.build_type == 'docker' || github.event.inputs.build_type == 'both'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-${{ matrix.goarch }}
          path: ./artifacts

      - name: Extract and prepare binary
        run: |
          cd ./artifacts
          tar xzf *.tar.gz
          # 找到解压后的二进制文件并重命名为固定名称
          BINARY_FILE=$(find . -maxdepth 1 -type f -executable -name "naviproxy-*")
          if [ -z "$BINARY_FILE" ]; then
            echo "Error: Binary file not found"
            exit 1
          fi
          mv "$BINARY_FILE" ../naviproxy-binary
          chmod +x ../naviproxy-binary
          ls -la ..

      - name: Build and push single arch image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.goarch }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:naviproxy-${{ matrix.goarch }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-multiarch-manifest:
    needs: build-docker
    if: github.event.inputs.build_type == 'docker' || github.event.inputs.build_type == 'both'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest with date tag
        run: |
          DATE_TAG="naviproxy-$(date +%y%m%d%H%M)"
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DATE_TAG} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:naviproxy-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:naviproxy-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${DATE_TAG}

      - name: Create manifest with latest tag
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:naviproxy-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:naviproxy-arm64
          docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  create-release:
    needs: build-binaries
    if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: |
          echo "=== Directory structure ==="
          ls -R ./artifacts
          echo ""
          echo "=== All tar.gz files ==="
          find ./artifacts -name "*.tar.gz" -type f

      - name: Generate release tag
        id: generate_tag
        run: |
          TAG_NAME="v$(date +%y%m%d%H%M)"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG_NAME}"

      - name: Create git tag
        env:
          TAG: ${{ steps.generate_tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${TAG} -m "Release ${TAG}"
          git push origin ${TAG}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag }}
          files: ./artifacts/**/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}