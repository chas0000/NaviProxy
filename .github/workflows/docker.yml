name: Build Docker Image and Binaries

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/naviproxy

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goarch == 'arm64' && '1' || '1' }}
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          BUILD_DATE=$(date +%y%m%d%H%M)
          OUTPUT_NAME="naviproxy-${BUILD_DATE}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-w -s" -trimpath -o "${OUTPUT_NAME}" main.go
          tar czf "${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"
          echo "BINARY_NAME=${OUTPUT_NAME}.tar.gz" >> $GITHUB_ENV
          echo "UNCOMPRESSED_NAME=${OUTPUT_NAME}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}

  build-docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-amd64
          path: ./build-context-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-arm64
          path: ./build-context-arm64

      - name: Extract and prepare binaries
        run: |
          # 处理 amd64
          cd ./build-context-amd64
          tar xzf *.tar.gz
          BINARY_FILE=$(find . -maxdepth 1 -type f -executable -name "naviproxy-*")
          mv "$BINARY_FILE" naviproxy-binary
          chmod +x naviproxy-binary

          # 处理 arm64
          cd ../build-context-arm64
          tar xzf *.tar.gz
          BINARY_FILE=$(find . -maxdepth 1 -type f -executable -name "naviproxy-*")
          mv "$BINARY_FILE" naviproxy-binary
          chmod +x naviproxy-binary

      - name: Generate date tag
        id: date_tag
        run: |
          DATE_TAG="naviproxy-$(date +%y%m%d%H%M)"
          echo "date_tag=${DATE_TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${DATE_TAG}"

      - name: Create multi-platform build context
        run: |
          mkdir -p docker-context
          cp Dockerfile docker-context/
          cp -r data docker-context/
          cp build-context-amd64/naviproxy-binary docker-context/naviproxy-binary-amd64
          cp build-context-arm64/naviproxy-binary docker-context/naviproxy-binary-arm64

      - name: Build and push multi-platform images
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date_tag.outputs.date_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./docker-context/Dockerfile

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: |
          echo "=== Directory structure ==="
          ls -R ./artifacts
          echo ""
          echo "=== All tar.gz files ==="
          find ./artifacts -name "*.tar.gz" -type f

      - name: Generate release tag
        id: generate_tag
        run: |
          TAG_NAME="v$(date +%y%m%d%H%M)"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG_NAME}"

      - name: Create git tag
        env:
          TAG: ${{ steps.generate_tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${TAG} -m "Release ${TAG}"
          git push origin ${TAG}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.generate_tag.outputs.tag }}
          files: ./artifacts/**/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}